    note: POST https://streams.v2.validic.com/streams creates a stream; up to 5 streams per customer.
  - url: https://developer.validic.com/docs/connect-to-a-stream
    type: APIReference
    note: GET /streams/:id/connect returns Content-Type text/event-stream (SSE), poke heartbeat every 5s, up to 3 concurrent connections. Not WebSocket.
  - url: https://help.validic.com/space/VCS/3374284801/Streaming+API+vs+Push+Service
    type: Documentation
    note: Push Service (webhook POST) vs Streaming API (SSE) delivery comparison.
  - url: https://help.validic.com/space/VCS/4314071049/Cellular-Enabled+Device+Support
    type: Documentation
    note: Cellular device activation/suspension (PUT) for RPM programs.
  - url: https://github.com/validic
    type: SourceCode
    note: Verified public GitHub org; active inform-quickstart plus archived language wrappers. Platform itself is proprietary.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Validic's own public API is
    request/response REST (Inform API) plus an HTTP Server-Sent Events stream
    (Streaming API) and a webhook Push Service. The SSE stream is captured in the
    OpenAPI (/streams/{id}/connect returning text/event-stream) and documented in
    the transports block above, so it is never misrepresented as WebSocket. No
    separate AsyncAPI document was authored for this entry.
