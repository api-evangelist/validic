aid: validic
url: https://raw.githubusercontent.com/api-evangelist/validic/refs/heads/main/apis.yml
name: Validic
kind: company
description: Validic is an enterprise health-data platform that connects patient-recorded
  data from digital health applications, medical devices, and wearables to healthcare
  organizations. Its Inform API and Mobile SDK provision users against an organization,
  present a hosted Marketplace for connecting API/cloud and Bluetooth sources, and
  return standardized health observations - CGM, intraday activity, point-in-time
  measurements, nutrition, sleep, daily summaries, and workouts. Validic also manages
  cellular-enabled devices, exposes connection-event history, and delivers data in
  real time through a Server-Sent Events Streaming API and a webhook Push Service.
  The platform is HITRUST-certified and HIPAA-compliant. Requests authenticate with
  an organization access token passed as the token query parameter over HTTPS.
